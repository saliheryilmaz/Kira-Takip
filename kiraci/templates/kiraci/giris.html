<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş — KiracıTakip</title>
    <link rel="icon" type="image/x-icon" href="/static/kiraci/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #f0f2f5;
            color: #1a202c;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            -webkit-font-smoothing: antialiased;
        }
        .box {
            background: #ffffff;
            border: 1px solid #e2e6ea;
            border-radius: 16px;
            padding: 40px 36px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05), 0 1px 3px rgba(0,0,0,0.06);
        }
        .logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .logo img {
            width: 52px; height: 52px;
            border-radius: 12px;
            object-fit: cover;
            margin-bottom: 14px;
        }
        .logo h1 {
            font-size: 20px;
            font-weight: 800;
            color: #1a202c;
            letter-spacing: -0.02em;
        }
        .logo p {
            font-size: 13px;
            color: #9aa5b4;
            margin-top: 4px;
        }
        .form-group { margin-bottom: 16px; }
        label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #4a5568;
            margin-bottom: 6px;
            letter-spacing: 0.01em;
        }
        input {
            width: 100%;
            background: #f7f8fa;
            border: 1px solid #d0d5dd;
            border-radius: 8px;
            padding: 10px 13px;
            color: #1a202c;
            font-size: 15px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.15s, box-shadow 0.15s;
        }
        input:focus {
            border-color: #2563eb;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
        }
        .btn {
            width: 100%;
            background: #2563eb;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 11px;
            font-size: 14px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            margin-top: 6px;
            letter-spacing: -0.01em;
            transition: background 0.15s;
        }
        .btn:hover { background: #1d4ed8; }
        .alt {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: #9aa5b4;
        }
        .alt a { color: #2563eb; font-weight: 600; text-decoration: none; }
        .alert {
            background: #fff5f5;
            color: #e53e3e;
            border: 1px solid rgba(229,62,62,0.2);
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 13px;
            margin-bottom: 16px;
            font-weight: 500;
        }
        @media (max-width: 480px) {
            .box { padding: 28px 20px; }
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="logo">
            <img src="/static/kiraci/logoo.png" alt="Logo">
            <h1>KiracıTakip</h1>
            <p>Mülk Yönetim Sistemi</p>
        </div>
        {% for message in messages %}
        <div class="alert">{{ message }}</div>
        {% endfor %}
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label>Kullanıcı Adı</label>
                <input type="text" name="username" autocomplete="username" autofocus>
            </div>
            <div class="form-group">
                <label>Şifre</label>
                <input type="password" name="password" autocomplete="current-password">
            </div>
            <button type="submit" class="btn">Giriş Yap</button>
        </form>
        <div class="alt">Hesabın yok mu? <a href="{% url 'kayit' %}">Kayıt Ol</a></div>
    </div>
</body>
</html>
